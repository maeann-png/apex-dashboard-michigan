name: Scrape LeafLink Sales (Michigan)

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:          # manual "Run workflow" button (and external triggers)

permissions:
  contents: write

# Never let two scraper runs overlap — prevents the workflow racing itself.
concurrency:
  group: scrape-leaflink
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so rebase/push is reliable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          LEAFLINK_API_KEY: ${{ secrets.LEAFLINK_API_KEY }}
          LEAFLINK_BRAND: 'Chill Medicated'
          LEAFLINK_SELLER_ID: '9105'
          LEAFLINK_FROM_DATE: '2025-05-01'
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sales_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto-update sales_data.json [skip ci]"
          # main may have moved (e.g. a manual commit, or another run) between
          # checkout and push. Rebase our commit on top of the latest remote and
          # retry, so the push never fails on a non-fast-forward.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push attempt $i failed (remote moved); retrying in 5s..."
            sleep 5
          done
          echo "ERROR: push failed after 5 attempts."
          exit 1
